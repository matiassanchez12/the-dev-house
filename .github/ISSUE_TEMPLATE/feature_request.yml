name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Overview
        Describe the feature or improvement you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: "What problem does this solve? Who needs it?"
      placeholder: "As a [role], I want to [action] so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other solutions you've considered?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Mockups, references, related issues, etc."
    validations:
      required: false