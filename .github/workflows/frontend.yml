name: Frontend CI

on:
  pull_request:
    branches: [development, master]
  push:
    branches: [development, master]

jobs:
  frontend:
    name: Frontend (build + test + typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit
