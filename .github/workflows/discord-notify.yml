name: Discord Notify

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEV_HOUSE }}
          AUTHOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          WEBHOOK=$(echo "$DISCORD_WEBHOOK" | xargs)
          if [ -z "$WEBHOOK" ]; then
            echo "ERROR: DISCORD_WEBHOOK_DEV_HOUSE is empty"
            exit 1
          fi
          curl -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"🚀 Push a ${BRANCH}\",\"description\":\"**${AUTHOR}** hizo push a **${BRANCH}**\\n\\n${COMMIT_MSG}\\n\\n🔗 [Ver cambios](${COMPARE_URL})\",\"color\":5814783,\"footer\":{\"text\":\"devhouse\"}}]}"