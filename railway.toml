[build]
builder = "nixpacks"
builder_version = "latest"

[build.env]
APP_ENV = "production"
PHP_VERSION = "8.2"
NODE_VERSION = "20"

[deploy]
healthCheckPath = "/"
startCommand = "php artisan migrate --force && php artisan storage:link && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=${PORT}"